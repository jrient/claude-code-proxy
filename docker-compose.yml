services:
  claude-code-proxy:
    build: .
    ports:
      - "8080:8080"   # Proxy port
      - "8081:8081"   # Admin panel
    volumes:
      - ./data:/app/data
      - ./config.yaml:/app/config.yaml:ro
    environment:
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-changeme}
    restart: unless-stopped
    networks:
      - app-network

networks:
  app-network:
    external: true
    name: app-network
